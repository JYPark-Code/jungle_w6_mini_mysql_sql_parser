<!DOCTYPE html>
<!--
  index.html — MiniSQL 웹 뷰어 (지용)
  ============================================================================

  ▣ 이 파일이 하는 일
    브라우저에서 SQL 을 입력하고 "Run" 버튼을 누르면 server.py 의 /query
    엔드포인트로 보내서 파싱 결과를 받아 표시한다.

  ▣ 신택스 하이라이트
    CodeMirror 5 (CDN) 사용. 좌측 SQL 입력은 sql 모드, 우측 결과는
    javascript 모드 (JSON 은 JS 의 부분집합이라 그대로 통한다).

  ▣ 의존성
    CodeMirror 5 만 CDN 에서 로드. 그 외 라이브러리 0 개.
    인터넷 안 되는 환경에서는 자동으로 평범한 textarea 로 폴백한다.
  ============================================================================
-->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MiniSQL Viewer</title>

<!-- CodeMirror 5 — 코어 + 다크 테마 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

<style>
  /* CSS 변수: 다크 테마 색을 한 곳에서 관리. */
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --success: #3fb950;
    --error: #f85149;
    --code: #1f2428;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 16px 24px;
    height: calc(100vh - 56px);
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  /* CodeMirror 가 차지할 영역 — flex: 1 로 패널 가득 채움 */
  .editor-host {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .CodeMirror {
    flex: 1;
    height: auto !important;
    font-family: "JetBrains Mono", "Menlo", "Monaco", monospace;
    font-size: 13px;
    line-height: 1.6;
  }
  /* CodeMirror 다크 테마와 우리 패널 색을 어울리게 미세 조정 */
  .cm-s-dracula.CodeMirror, .cm-s-dracula .CodeMirror-gutters {
    background: var(--code) !important;
  }

  /* 폴백 textarea (CodeMirror 로드 실패 시) */
  textarea.fallback {
    flex: 1;
    background: var(--code);
    color: var(--text);
    border: none;
    padding: 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    outline: none;
  }

  .actions {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  button {
    background: var(--accent);
    color: #0d1117;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .status { margin-left: auto; font-size: 12px; color: var(--muted); }
  .status.ok  { color: var(--success); }
  .status.err { color: var(--error); }

  /* stderr / 에러 표시 영역 (오른쪽 패널 하단) */
  .meta {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    background: rgba(0,0,0,0.2);
    max-height: 100px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .meta.err { color: var(--error); }

  kbd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>MiniSQL Viewer</h1>
  <span class="badge">parser → JSON → 표시</span>
</header>

<main>

  <!-- 왼쪽: SQL 입력 (CodeMirror SQL 모드) -->
  <section class="panel">
    <div class="panel-header">
      <span>SQL 입력</span>
      <span><kbd>Ctrl</kbd> + <kbd>Enter</kbd> 실행</span>
    </div>
    <div class="editor-host">
      <textarea id="sql" class="fallback" spellcheck="false">CREATE TABLE users (id INT, name VARCHAR, age INT, joined DATE);
INSERT INTO users (id, name, age, joined) VALUES (1, 'alice', 25, '2024-01-15');
INSERT INTO users (id, name, age, joined) VALUES (2, 'bob', 31, '2024-03-02');
SELECT id, name FROM users WHERE age > 26 ORDER BY name DESC LIMIT 5;
DELETE FROM users WHERE id = 1;</textarea>
    </div>
    <div class="actions">
      <button id="run">▶ Run</button>
      <button id="clear" class="secondary">Clear</button>
      <span id="status" class="status">대기 중</span>
    </div>
  </section>

  <!-- 오른쪽: 파싱 결과 (CodeMirror JSON 뷰, read-only) -->
  <section class="panel">
    <div class="panel-header">
      <span>파싱 결과 (JSON)</span>
      <span id="stmt-count"></span>
    </div>
    <div class="editor-host">
      <textarea id="output" class="fallback" readonly>// Run 버튼을 눌러보세요.</textarea>
    </div>
    <div id="meta" class="meta" style="display:none"></div>
  </section>

</main>

<!-- CodeMirror 5 — 코어 + SQL 모드 + JS(JSON) 모드 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

<script>
  /* ----------------------------------------------------------------------
   * MiniSQL Viewer — CodeMirror 기반 SQL/JSON 뷰어
   * ----------------------------------------------------------------------
   */

  const $sqlTextarea    = document.getElementById('sql');
  const $outputTextarea = document.getElementById('output');
  const $run            = document.getElementById('run');
  const $clear          = document.getElementById('clear');
  const $status         = document.getElementById('status');
  const $stmtCount      = document.getElementById('stmt-count');
  const $meta           = document.getElementById('meta');

  // CodeMirror 인스턴스 (로드 실패 시 null 로 두고 textarea 폴백 사용)
  let sqlEditor = null;
  let outEditor = null;

  // CodeMirror 라이브러리가 로드됐으면 두 textarea 를 에디터로 변환.
  if (typeof CodeMirror !== 'undefined') {
    sqlEditor = CodeMirror.fromTextArea($sqlTextarea, {
      mode: 'text/x-sql',
      theme: 'dracula',
      lineNumbers: true,
      lineWrapping: true,
      indentUnit: 2,
      tabSize: 2,
      extraKeys: {
        'Ctrl-Enter': runQuery,
        'Cmd-Enter':  runQuery,
      },
    });

    outEditor = CodeMirror.fromTextArea($outputTextarea, {
      mode: { name: 'javascript', json: true },
      theme: 'dracula',
      lineNumbers: true,
      lineWrapping: true,
      readOnly: true,
    });
  }

  // 좌측 SQL 텍스트 가져오기 (에디터 / 폴백 양쪽 지원)
  function getSqlText() {
    return sqlEditor ? sqlEditor.getValue() : $sqlTextarea.value;
  }
  // 좌측 SQL 텍스트 설정
  function setSqlText(text) {
    if (sqlEditor) sqlEditor.setValue(text);
    else           $sqlTextarea.value = text;
  }
  // 우측 결과 텍스트 설정
  function setOutputText(text) {
    if (outEditor) outEditor.setValue(text);
    else           $outputTextarea.value = text;
  }

  // 상태 텍스트 갱신 + 클래스 (ok / err) 토글
  function setStatus(text, kind) {
    $status.textContent = text;
    $status.className = 'status' + (kind ? ' ' + kind : '');
  }

  // 메타 영역 (stderr / 에러) 표시
  function setMeta(text, kind) {
    if (!text) {
      $meta.style.display = 'none';
      $meta.textContent = '';
      $meta.className = 'meta';
      return;
    }
    $meta.style.display = 'block';
    $meta.textContent = text;
    $meta.className = 'meta' + (kind ? ' ' + kind : '');
  }

  // 서버 응답 (result) 을 받아 화면에 그리기.
  function renderResult(result) {
    // 에러가 있으면 에러 메시지 표시 후 종료.
    if (result.error) {
      setOutputText('// ' + result.error);
      setMeta(result.error, 'err');
      $stmtCount.textContent = '';
      return;
    }

    const stmts = result.statements || [];
    $stmtCount.textContent =
      `${stmts.length} statement${stmts.length === 1 ? '' : 's'}`;

    // 파싱된 모든 statement 를 하나의 JSON 배열로 보여준다.
    // (server.py 가 raw 로 잡은 것들도 같이 표시되지만 이제 main.c
    //  --json 격리 덕분에 거의 안 나와야 함.)
    if (stmts.length === 0) {
      setOutputText('// (빈 결과)');
    } else {
      setOutputText(JSON.stringify(stmts, null, 2));
    }

    // sqlparser 가 stderr 에 찍은 메시지가 있으면 하단에 별도 표시
    setMeta(result.stderr && result.stderr.trim() ? result.stderr : '');
  }

  // Run 버튼 / Ctrl+Enter / Cmd+Enter
  async function runQuery() {
    const sql = getSqlText().trim();
    if (!sql) { setStatus('SQL 비어있음', 'err'); return; }

    $run.disabled = true;
    setStatus('파싱 중...');

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql }),
      });
      const data = await res.json();
      renderResult(data);
      setStatus(res.ok ? '완료' : '에러', res.ok ? 'ok' : 'err');
    } catch (e) {
      setOutputText('// 요청 실패: ' + e.message);
      setMeta('네트워크 에러: ' + e.message, 'err');
      setStatus('네트워크 에러', 'err');
    } finally {
      $run.disabled = false;
    }
  }

  // 이벤트 핸들러 등록
  $run.addEventListener('click', runQuery);
  $clear.addEventListener('click', () => {
    setSqlText('');
    setOutputText('// Run 버튼을 눌러보세요.');
    setMeta('');
    $stmtCount.textContent = '';
    setStatus('대기 중');
  });

  // CodeMirror 가 로드 안 된 경우 (오프라인 등) 폴백 textarea 에서도
  // Ctrl+Enter 가 동작하도록 등록.
  if (!sqlEditor) {
    $sqlTextarea.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runQuery();
      }
    });
  }
</script>

</body>
</html>
