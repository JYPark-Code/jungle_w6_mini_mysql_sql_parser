<!DOCTYPE html>
<!--
  index.html — MiniSQL 웹 뷰어 (지용)
  ============================================================================

  ▣ 이 파일이 하는 일
    브라우저에서 SQL 을 입력하고, "Run" 버튼을 누르면 server.py 의
    /query 엔드포인트로 보내서 파싱 결과를 받아 표시한다.

  ▣ 구조
    1) <style>  : 다크 테마 스타일 (CSS 변수로 색 정의)
    2) <header> : 상단 타이틀 바
    3) <main>   : 좌우 2분할 패널 (왼쪽=SQL 입력, 오른쪽=결과)
    4) <script> : Run 버튼 / Ctrl+Enter / fetch 호출 / 결과 렌더링

  ▣ 의존성
    외부 라이브러리/CDN 0개. 순수 HTML + CSS + JS.
  ============================================================================
-->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MiniSQL Viewer</title>
<style>
  /* CSS 변수: 색을 한 곳에서 관리. 다크 테마 (GitHub 스타일). */
  :root {
    --bg: #0d1117;        /* 본문 배경 */
    --panel: #161b22;     /* 패널 배경 */
    --border: #30363d;    /* 경계선 */
    --text: #c9d1d9;      /* 일반 텍스트 */
    --muted: #8b949e;     /* 약한 텍스트 (라벨, 힌트) */
    --accent: #58a6ff;    /* 강조 (버튼, 포인트) */
    --success: #3fb950;   /* 성공 상태 */
    --error: #f85149;     /* 에러 상태 */
    --code: #1f2428;      /* 코드/textarea 배경 */
  }

  /* 모든 요소가 padding/border 까지 포함해서 width 계산하도록. */
  * { box-sizing: border-box; }

  /* 페이지 전체 기본 설정. */
  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
  }

  /* 상단 헤더 바. */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 18px;
    margin: 0;
    font-weight: 600;
  }
  /* 헤더 옆에 붙는 작은 뱃지. */
  header .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  /* main: 좌우 2분할. CSS Grid 사용. */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;     /* 두 칸 동일 비율 */
    gap: 16px;
    padding: 16px 24px;
    height: calc(100vh - 56px);          /* 전체 높이 - 헤더 높이 */
  }

  /* 패널 카드 공통 스타일. */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* SQL 입력 textarea: 모노스페이스 폰트, 패널 가득 채움. */
  textarea {
    flex: 1;
    background: var(--code);
    color: var(--text);
    border: none;
    padding: 14px;
    font-family: "JetBrains Mono", "Menlo", "Monaco", monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    outline: none;
  }

  /* 버튼 행. */
  .actions {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  button {
    background: var(--accent);
    color: #0d1117;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* 상태 표시 (대기 중 / 파싱 중 / 완료 / 에러). */
  .status {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
  }
  .status.ok { color: var(--success); }
  .status.err { color: var(--error); }

  /* 결과 출력 pre 박스. */
  pre {
    flex: 1;
    margin: 0;
    padding: 14px;
    background: var(--code);
    overflow: auto;
    font-family: "JetBrains Mono", "Menlo", monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* statement 한 개를 카드처럼 감싸는 스타일. */
  .stmt {
    border-left: 3px solid var(--accent);
    padding: 6px 12px;
    margin-bottom: 10px;
    background: rgba(88, 166, 255, 0.05);
  }
  .stmt-type {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }

  /* sqlparser 가 stderr 에 찍은 메시지 (storage 스텁 등) 표시 영역. */
  .stderr {
    color: var(--muted);
    font-size: 11px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    margin-top: 10px;
  }

  /* Ctrl+Enter 같은 키보드 표시. */
  kbd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>

<!-- 상단 헤더 -->
<header>
  <h1>MiniSQL Viewer</h1>
  <span class="badge">parser → JSON → 표시</span>
</header>

<!-- 메인: 좌(SQL 입력) / 우(결과) -->
<main>

  <!-- 왼쪽 패널: SQL 입력 -->
  <section class="panel">
    <div class="panel-header">
      <span>SQL 입력</span>
      <span><kbd>Ctrl</kbd> + <kbd>Enter</kbd> 실행</span>
    </div>
    <!-- 기본값으로 데모용 SQL 5줄을 미리 채워둠. 사용자가 바로 Run 가능. -->
    <textarea id="sql" spellcheck="false">CREATE TABLE users (id INT, name VARCHAR, age INT, joined DATE);
INSERT INTO users (id, name, age, joined) VALUES (1, 'alice', 25, '2024-01-15');
INSERT INTO users (id, name, age, joined) VALUES (2, 'bob', 31, '2024-03-02');
SELECT id, name FROM users WHERE age > 26 ORDER BY name DESC LIMIT 5;
DELETE FROM users WHERE id = 1;</textarea>
    <div class="actions">
      <button id="run">▶ Run</button>
      <button id="clear" class="secondary">Clear</button>
      <span id="status" class="status">대기 중</span>
    </div>
  </section>

  <!-- 오른쪽 패널: 결과 -->
  <section class="panel">
    <div class="panel-header">
      <span>파싱 결과</span>
      <span id="stmt-count"></span>
    </div>
    <pre id="output">결과가 여기에 표시됩니다.</pre>
  </section>

</main>

<script>
  /* ----------------------------------------------------------------------
   * 자바스크립트: Run 버튼 / Ctrl+Enter / fetch 로 /query 호출
   * ----------------------------------------------------------------------
   */

  // 자주 쓰는 DOM 요소들을 한 번에 잡아둔다.
  // ($ 접두사는 "DOM 요소" 라는 표시 — 변수 이름 컨벤션.)
  const $sql       = document.getElementById('sql');
  const $run       = document.getElementById('run');
  const $clear     = document.getElementById('clear');
  const $status    = document.getElementById('status');
  const $output    = document.getElementById('output');
  const $stmtCount = document.getElementById('stmt-count');

  // 상태 텍스트 갱신 + 클래스 (ok / err) 토글.
  function setStatus(text, kind) {
    $status.textContent = text;
    $status.className = 'status' + (kind ? ' ' + kind : '');
  }

  // HTML 인젝션 방지: 사용자 입력에 < > & 가 있으면 escape.
  // 안 하면 SQL 안에 <script> 같은 게 들어올 때 위험.
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // 서버 응답 (result) 을 받아 화면에 그리기.
  function renderResult(result) {
    // 에러가 있으면 빨간 글씨로 보여주고 끝.
    if (result.error) {
      $output.innerHTML = `<span style="color:var(--error)">${escapeHtml(result.error)}</span>`;
      $stmtCount.textContent = '';
      return;
    }

    const stmts = result.statements || [];
    $stmtCount.textContent = `${stmts.length} statement${stmts.length === 1 ? '' : 's'}`;

    // statement 마다 카드 모양으로 출력.
    let html = '';
    for (const s of stmts) {
      const type = s.type || 'UNKNOWN';
      // JSON.stringify 의 세 번째 인자 2 = 들여쓰기 2칸으로 예쁘게.
      const pretty = JSON.stringify(s, null, 2);
      html += `<div class="stmt"><div class="stmt-type">${escapeHtml(type)}</div>${escapeHtml(pretty)}</div>`;
    }

    // sqlparser 가 stderr 에 찍은 메시지가 있으면 같이 표시.
    if (result.stderr && result.stderr.trim()) {
      html += `<div class="stderr">stderr:\n${escapeHtml(result.stderr)}</div>`;
    }

    $output.innerHTML = html || '(빈 결과)';
  }

  // Run 버튼이 눌리거나 Ctrl+Enter 가 들어오면 실행.
  // async/await 로 fetch 비동기 호출.
  async function runQuery() {
    const sql = $sql.value.trim();
    if (!sql) { setStatus('SQL 비어있음', 'err'); return; }

    // 요청 중에는 버튼 잠그기 (중복 클릭 방지).
    $run.disabled = true;
    setStatus('파싱 중...');

    try {
      // server.py 의 /query 로 POST. body 는 JSON.
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql }),
      });
      const data = await res.json();
      renderResult(data);
      setStatus(res.ok ? '완료' : '에러', res.ok ? 'ok' : 'err');
    } catch (e) {
      // 네트워크 에러 등 (서버 안 켜져 있을 때 등).
      $output.innerHTML = `<span style="color:var(--error)">요청 실패: ${escapeHtml(e.message)}</span>`;
      setStatus('네트워크 에러', 'err');
    } finally {
      // 성공/실패 무관 버튼 다시 활성화.
      $run.disabled = false;
    }
  }

  // 이벤트 핸들러 등록.
  $run.addEventListener('click', runQuery);

  // Clear 버튼: 입력/결과/상태 모두 초기화.
  $clear.addEventListener('click', () => {
    $sql.value = '';
    $output.textContent = '결과가 여기에 표시됩니다.';
    $stmtCount.textContent = '';
    setStatus('대기 중');
  });

  // Ctrl+Enter (Mac 은 Cmd+Enter) 단축키.
  $sql.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runQuery();
    }
  });
</script>

</body>
</html>
